<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .form-container h1 {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #e74c3c;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
        }
        
        .back-link:hover {
            color: #e74c3c;
        }
        
        .frequency-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .scanner-box {
            background: #fff5f5;
            border: 1px solid #fadbd8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 22px;
        }

        .scan-btn {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .scan-btn:hover {
            background: #34495e;
        }

        .receipt-preview {
            display: none;
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 12px;
            background: #f8f9fa;
            border: 1px solid #ecf0f1;
        }

        .scan-status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .scan-status.error {
            color: #c0392b;
        }

        .scan-status.success {
            color: #1e8449;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/expenses">Expenses History</a></li>
            <li><a href="/collaboration">Collaboration</a></li>
            <li><a href="/prediction">Prediction</a></li>
        </ul>
        <button id="dark-mode-toggle">Dark Mode</button>
    </div>
    
    <div class="main-content">
        <header>
            <h1>🧾 Add Expense</h1>
        </header>
        
        <div class="form-container">
            <form method="POST" action="/add_expense_entry">
                <div class="scanner-box">
                    <div class="form-group">
                        <label for="receipt_upload">Upload Receipt Image</label>
                        <input type="file" id="receipt_upload" accept="image/*">
                        <input type="hidden" id="receipt_image" name="receipt_image">
                        <button type="button" class="scan-btn" id="scanReceiptBtn">Scan Receipt & Auto-fill</button>
                        <img id="receiptPreview" class="receipt-preview" alt="Receipt preview">
                        <div id="scanStatus" class="scan-status">Receipt scanning is optional. You can always enter details manually.</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Expense Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Groceries, Rent, Transport" required>
                </div>
                
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" placeholder="Enter amount" min="0" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="Food">Food</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Travel">Travel</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="frequency">Frequency</label>
                    <select id="frequency" name="frequency" required>
                        <option value="monthly">Monthly</option>
                        <option value="weekly">Weekly</option>
                        <option value="daily">Daily</option>
                    </select>
                    <p class="frequency-hint">Select how often you incur this expense</p>
                </div>
                
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                
                <button type="submit" class="submit-btn">Add Expense</button>
                
                <a href="/prediction" class="back-link">← Back to Prediction</a>
            </form>
        </div>
    </div>
    
    <script>
        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();
        
        // Dark mode toggle
        const toggle = document.getElementById('dark-mode-toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        const receiptUpload = document.getElementById('receipt_upload');
        const receiptPreview = document.getElementById('receiptPreview');
        const receiptImageInput = document.getElementById('receipt_image');
        const scanStatus = document.getElementById('scanStatus');
        const scanReceiptBtn = document.getElementById('scanReceiptBtn');

        receiptUpload.addEventListener('change', () => {
            const file = receiptUpload.files[0];
            if (!file) {
                receiptPreview.style.display = 'none';
                return;
            }

            receiptPreview.src = URL.createObjectURL(file);
            receiptPreview.style.display = 'block';
            scanStatus.className = 'scan-status';
            scanStatus.textContent = 'Receipt selected. Click scan to auto-fill fields.';
        });

        scanReceiptBtn.addEventListener('click', async () => {
            const file = receiptUpload.files[0];
            if (!file) {
                scanStatus.className = 'scan-status error';
                scanStatus.textContent = 'Please choose a receipt image first.';
                return;
            }

            const formData = new FormData();
            formData.append('receipt_image', file);

            scanReceiptBtn.disabled = true;
            scanStatus.className = 'scan-status';
            scanStatus.textContent = 'Scanning receipt...';

            try {
                const response = await fetch('/scan_receipt', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.image_url) {
                    receiptPreview.src = data.image_url;
                    receiptPreview.style.display = 'block';
                }
                if (data.receipt_image) {
                    receiptImageInput.value = data.receipt_image;
                }

                if (!data.success) {
                    scanStatus.className = 'scan-status error';
                    scanStatus.textContent = data.error || 'Receipt scanning is not available. Please enter details manually.';
                    return;
                }

                const fields = data.fields || {};
                if (fields.name) document.getElementById('name').value = fields.name;
                if (fields.amount) document.getElementById('amount').value = fields.amount;
                if (fields.date) document.getElementById('date').value = fields.date;
                if (fields.category) document.getElementById('category').value = fields.category;

                scanStatus.className = 'scan-status success';
                scanStatus.textContent = 'Receipt scanned. Please review and edit details before saving.';
            } catch (error) {
                scanStatus.className = 'scan-status error';
                scanStatus.textContent = 'Receipt scanning is not available. Please enter details manually.';
            } finally {
                scanReceiptBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
