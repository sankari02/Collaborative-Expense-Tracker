<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bill / Subscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-card h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-card .subtitle {
            color: #a0a0a0;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #a0a0a0;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .checkbox-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-item span {
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .quick-bills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quick-bill {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #a0a0a0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-bill:hover {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }

        .quick-bill.active {
            background: #27ae60;
            color: #fff;
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.35);
        }

        .scanner-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .scanner-box label {
            color: #a0a0a0;
            display: block;
            margin-bottom: 8px;
        }

        .scan-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .receipt-preview {
            display: none;
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 12px;
            background: rgba(255,255,255,0.08);
        }

        .scan-status {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .scan-status.error {
            color: #ffb4a8;
        }

        .scan-status.success {
            color: #8ff0b2;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-card {
                padding: 25px;
            }

            .form-card h1 {
                font-size: 1.5rem;
            }

            .checkbox-group {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>➕ Add Bill / Subscription</h1>
            <p class="subtitle">Track your recurring expenses</p>

            <form method="POST">
                <div class="scanner-box">
                    <label for="bill_receipt_upload">Upload Receipt Image (Optional)</label>
                    <input type="file" id="bill_receipt_upload" accept="image/*">
                    <button type="button" class="scan-btn" id="scanBillReceiptBtn">Scan Receipt & Auto-fill</button>
                    <img id="billReceiptPreview" class="receipt-preview" alt="Receipt preview">
                    <div id="billScanStatus" class="scan-status">Receipt scanning is optional. You can always enter details manually.</div>
                </div>

                <div class="form-group">
                    <label>Quick Add Popular Bills</label>
                    <div class="quick-bills">
                        <button type="button" class="quick-bill" onclick="fillBill('Rent', 15000, 'Monthly')">🏠 Rent</button>
                        <button type="button" class="quick-bill" onclick="fillBill('Netflix', 499, 'Monthly')">📺 Netflix</button>
                        <button type="button" class="quick-bill" onclick="fillBill('Electricity', 1500, 'Monthly')">⚡ Electricity</button>
                        <button type="button" class="quick-bill" onclick="fillBill('Internet', 899, 'Monthly')">🌐 Internet</button>
                        <button type="button" class="quick-bill" onclick="fillBill('Phone', 599, 'Monthly')">📱 Phone</button>
                        <button type="button" class="quick-bill" onclick="fillBill('Gas', 800, 'Monthly')">🔥 Gas</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Bill Name *</label>
                    <input type="text" name="name" placeholder="e.g., Netflix, Rent, Electricity" required>
                </div>

                <div class="form-group">
                    <label>Amount (₹) *</label>
                    <input type="number" name="amount" placeholder="Enter amount" required min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label>Due Date *</label>
                    <input type="date" name="due_date" required>
                </div>

                <div class="form-group">
                    <label>Frequency</label>
                    <select name="frequency">
                        <option value="monthly">Monthly</option>
                        <option value="weekly">Weekly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Insurance">Insurance</option>
                        <option value="Rent">Rent</option>
                        <option value="Subscription">Subscription</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Bill Type</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="is_fixed" checked>
                            <span>📊 Fixed Expense</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="auto_pay">
                            <span>🤖 Auto-Pay Enabled</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Add Bill</button>
                <a href="{{ url_for('bills_page') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>

    <script>
        const quickBillPresets = {
            Rent: { category: 'Rent', dueDay: 1 },
            Netflix: { category: 'Subscription', dueDay: 5 },
            Electricity: { category: 'Utilities', dueDay: 10 },
            Internet: { category: 'Utilities', dueDay: 15 },
            Phone: { category: 'Utilities', dueDay: 20 },
            Gas: { category: 'Utilities', dueDay: 25 }
        };

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function getNextDueDate(day) {
            const today = new Date();
            const dueDate = new Date(today.getFullYear(), today.getMonth(), day);
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            if (dueDate < todayStart) {
                dueDate.setMonth(dueDate.getMonth() + 1);
            }

            return formatDate(dueDate);
        }

        function fillBill(name, amount, frequency) {
            const preset = quickBillPresets[name] || { category: 'Bills', dueDay: new Date().getDate() };
            const activeButton = window.event ? window.event.currentTarget : null;

            document.querySelector('input[name="name"]').value = name;
            document.querySelector('input[name="amount"]').value = amount;
            document.querySelector('input[name="due_date"]').value = getNextDueDate(preset.dueDay);
            document.querySelector('select[name="frequency"]').value = String(frequency || 'monthly').toLowerCase();
            document.querySelector('select[name="category"]').value = preset.category;

            document.querySelectorAll('.quick-bill').forEach((button) => {
                button.classList.toggle('active', button === activeButton);
            });
        }

        // Set default date to today
        document.querySelector('input[name="due_date"]').value = formatDate(new Date());

        const billReceiptUpload = document.getElementById('bill_receipt_upload');
        const billReceiptPreview = document.getElementById('billReceiptPreview');
        const billScanStatus = document.getElementById('billScanStatus');
        const scanBillReceiptBtn = document.getElementById('scanBillReceiptBtn');

        billReceiptUpload.addEventListener('change', () => {
            const file = billReceiptUpload.files[0];
            if (!file) {
                billReceiptPreview.style.display = 'none';
                return;
            }

            billReceiptPreview.src = URL.createObjectURL(file);
            billReceiptPreview.style.display = 'block';
            billScanStatus.className = 'scan-status';
            billScanStatus.textContent = 'Receipt selected. Click scan to auto-fill fields.';
        });

        scanBillReceiptBtn.addEventListener('click', async () => {
            const file = billReceiptUpload.files[0];
            if (!file) {
                billScanStatus.className = 'scan-status error';
                billScanStatus.textContent = 'Please choose a receipt image first.';
                return;
            }

            const formData = new FormData();
            formData.append('receipt_image', file);

            scanBillReceiptBtn.disabled = true;
            billScanStatus.className = 'scan-status';
            billScanStatus.textContent = 'Scanning receipt...';

            try {
                const response = await fetch('/scan_receipt', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.image_url) {
                    billReceiptPreview.src = data.image_url;
                    billReceiptPreview.style.display = 'block';
                }

                if (!data.success) {
                    billScanStatus.className = 'scan-status error';
                    billScanStatus.textContent = data.error || 'Receipt scanning is not available. Please enter details manually.';
                    return;
                }

                const fields = data.fields || {};
                if (fields.name) document.querySelector('input[name="name"]').value = fields.name;
                if (fields.amount) document.querySelector('input[name="amount"]').value = fields.amount;
                if (fields.date) document.querySelector('input[name="due_date"]').value = fields.date;
                if (fields.category) {
                    const categorySelect = document.querySelector('select[name="category"]');
                    const hasCategory = Array.from(categorySelect.options).some((option) => option.value === fields.category);
                    categorySelect.value = hasCategory ? fields.category : 'Other';
                }

                billScanStatus.className = 'scan-status success';
                billScanStatus.textContent = 'Receipt scanned. Please review and edit details before saving.';
            } catch (error) {
                billScanStatus.className = 'scan-status error';
                billScanStatus.textContent = 'Receipt scanning is not available. Please enter details manually.';
            } finally {
                scanBillReceiptBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
