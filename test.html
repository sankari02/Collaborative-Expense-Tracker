<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup with Close Icon</title>
  <style>
    /* Popup background overlay */
.popup {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
}

/* Popup content box */
.popup-content {
  background-color: white;
  margin: 15% auto;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  position: relative;
  text-align: center;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
}

/* Close icon */
.close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 24px;
  font-weight: bold;
  color: #333;
  cursor: pointer;
  transition: color 0.3s;
}

.close:hover {
  color: red;
}

  </style>
</head>
<body>

<!-- Trigger Button -->
<button id="show_popup">Show Popup</button>

<!-- Popup -->
<div id="myPopup" class="popup">
  <div class="popup-content">
    <span class="close" id="close_btn">&times;</span>
    <h2>This is a popup!</h2>
    <p>You can close it by clicking the "×" icon.</p>
  </div>
</div>

<script type="module">

    function showPopup() {
        document.getElementById('myPopup').style.display = 'block';
    }

    function closePopup() {
    document.getElementById('myPopup').style.display = 'none';
    }

    document.getElementById("close_btn").addEventListener("click",()=>{
        closePopup()
    })

    document.getElementById("show_popup").addEventListener('click',()=>{
        showPopup()
    })
</script>
</body>
</html>
